<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo - Librería Lerner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F3EC;
      --ink: #1C1A14;
      --ink-light: #5A5647;
      --ink-faint: #9A9385;
      --gold: #B8860B;
      --gold-light: #F5EDD4;
      --gold-border: #D4B87A;
      --red: #8B2222;
      --red-light: #F5E8E8;
      --green: #1B4D35;
      --green-light: #E8F2EC;
      --border: #E0D9CC;
      --surface: #FFFFFF;
      --radius: 6px;
      --radius-lg: 12px;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--ink);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .header img { height: 36px; width: auto; filter: brightness(0) invert(1); opacity: 0.9; }
    .header-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.2); }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap i {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: var(--ink-faint); pointer-events: none;
    }
    #search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.4); }
    #search-input:focus { border-color: var(--gold-border); background: rgba(255,255,255,0.12); }

    /* Main */
    .main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

    /* Estado inicial */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    .empty-icon {
      font-size: 56px;
      color: var(--ink-faint);
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--ink-light);
      margin-bottom: 8px;
    }
    .empty-sub { font-size: 14px; color: var(--ink-faint); }

    /* Status */
    #status {
      font-size: 13px;
      color: var(--ink-faint);
      text-align: center;
      padding: 8px 0;
      min-height: 24px;
    }

    /* Resultados */
    #results { display: none; }
    .results-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .results-count {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--ink);
    }
    .results-query {
      font-size: 13px;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* Tarjetas */
    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    .book-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .book-cover {
      width: 80px;
      min-height: 120px;
      flex-shrink: 0;
      background: var(--gold-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .book-cover-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      text-align: center;
    }
    .book-cover-placeholder i { font-size: 24px; color: var(--gold); opacity: 0.5; }
    .book-cover-placeholder span { font-size: 9px; color: var(--ink-faint); line-height: 1.3; }

    .book-body { flex: 1; padding: 14px 16px; min-width: 0; }

    .book-meta-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      flex: 1;
    }
    .book-title.agotado { color: var(--ink-light); }

    .stock-tag {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .stock-tag.disponible { background: var(--green-light); color: var(--green); }
    .stock-tag.bajo { background: var(--gold-light); color: var(--gold); }
    .stock-tag.agotado { background: var(--red-light); color: var(--red); }

    .book-author { font-size: 13px; color: var(--ink-light); margin-bottom: 6px; }
    .book-editorial { font-size: 11px; color: var(--ink-faint); margin-bottom: 8px; }

    .book-synopsis {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.6;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .book-price {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--green);
      font-weight: 600;
    }
    .book-price.agotado { color: var(--ink-faint); }

    .book-sedes {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .sede-chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--ink-light);
      background: var(--cream);
    }

    .book-extra {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .book-extra span {
      font-size: 11px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* Sin resultados */
    #no-results {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }
    #no-results i { font-size: 40px; color: var(--ink-faint); opacity: 0.3; display: block; margin-bottom: 12px; }
    #no-results p { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--ink-light); }
    #no-results small { font-size: 13px; color: var(--ink-faint); }

    .footer { text-align: center; padding: 2rem 0 1rem; font-size: 11px; color: var(--ink-faint); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ_qp9KAm1Augwa00PtLN0bfayFugg3bEeQ-UYwFNu-VPLV5NsaJi3vqrkKk-4q4N0Sri5d1rFCoE-/pub?output=csv";
const GOOGLE_BOOKS = "https://www.googleapis.com/books/v1/volumes?q=isbn:";

let catalog = [];
let loaded = false;
let searchTimer = null;
let bookCache = {};

// ── Parser ──────────────────────────────────────────────────
function splitRow(row, sep) {
  if (sep === '\t') return row.split('\t').map(c => c.trim().replace(/"/g, ''));
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { if (inQ && row[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = splitRow(lines[0], sep).map(h => h.trim());
  const idx = {
    isbn: headers.findIndex(h => h === 'ISBN'),
    lerner: headers.findIndex(h => h === 'Codigo Lerner'),
    titulo: headers.findIndex(h => h === 'Titulo'),
    autor: headers.findIndex(h => h === 'Autor'),
    editorial: headers.findIndex(h => h === 'Editorial'),
    tematica: headers.findIndex(h => h === 'Tematica'),
    proveedor: headers.findIndex(h => h === 'Proveedor'),
    bodega: headers.findIndex(h => h === 'Bodega'),
    precio: headers.findIndex(h => h === 'Precio'),
    ubicacion: headers.findIndex(h => h === 'Ubicacion'),
    saldo: headers.findIndex(h => h === 'Saldo'),
  };

  const books = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = splitRow(lines[i], sep);
    if (!cols[0]) continue;
    const isbn = cols[idx.isbn] || '';
    if (!isbn) continue;
    const ubicacion = cols[idx.ubicacion] || '';
    const saldo = parseInt(cols[idx.saldo] || '0') || 0;
    if (!books[isbn]) {
      books[isbn] = {
        isbn,
        lerner: cols[idx.lerner] || '',
        titulo: cols[idx.titulo] || '',
        autor: cols[idx.autor] || '',
        editorial: cols[idx.editorial] || '',
        tematica: cols[idx.tematica] || '',
        precio: parseInt((cols[idx.precio] || '0').replace(/\D/g, '')) || 0,
        sedes: [],
        totalSaldo: 0,
      };
    }
    if (ubicacion) {
      books[isbn].sedes.push({ ubicacion, saldo });
      books[isbn].totalSaldo += saldo;
    }
  }
  catalog = Object.values(books);
}

async function loadCatalog() {
  document.getElementById('status').textContent = 'Cargando catálogo...';
  try {
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error();
    parseCSV(await resp.text());
    loaded = true;
    document.getElementById('status').textContent = '';
    document.getElementById('search-input').focus();
  } catch(e) {
    document.getElementById('status').textContent = 'Error al cargar el catálogo.';
  }
}
loadCatalog();

// ── Google Books ────────────────────────────────────────────
async function fetchBookInfo(isbn) {
  if (bookCache[isbn]) return bookCache[isbn];
  try {
    const resp = await fetch(GOOGLE_BOOKS + isbn + '&maxResults=1');
    const data = await resp.json();
    if (data.items && data.items.length > 0) {
      const info = data.items[0].volumeInfo;
      const result = {
        synopsis: info.description || '',
        cover: info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : null,
        pages: info.pageCount || null,
        year: info.publishedDate ? info.publishedDate.substring(0, 4) : null,
        categories: info.categories ? info.categories[0] : null,
      };
      bookCache[isbn] = result;
      return result;
    }
  } catch(e) {}
  return null;
}

// ── Búsqueda ────────────────────────────────────────────────
function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, ' ');
}

function search(query) {
  const terms = normalize(query).split(/\s+/).filter(t => t.length > 1);
  if (terms.length === 0) return [];
  return catalog.filter(book => {
    const haystack = normalize(book.titulo + ' ' + book.autor + ' ' + book.tematica + ' ' + book.editorial);
    return terms.every(t => haystack.includes(t));
  });
}

// ── Render ──────────────────────────────────────────────────
function fmtPrice(n) { return '$ ' + n.toLocaleString('es-CO'); }

function stockInfo(book) {
  if (book.totalSaldo <= 0) return { label: 'Agotado', cls: 'agotado' };
  if (book.totalSaldo <= 3) return { label: `Stock bajo: ${book.totalSaldo}`, cls: 'bajo' };
  return { label: `En stock: ${book.totalSaldo}`, cls: 'disponible' };
}

async function renderResults(books, query) {
  const list = document.getElementById('results-list');
  const stock = books.map(b => stockInfo(b));

  // Render inicial sin portadas
  list.innerHTML = books.map((book, i) => {
    const s = stock[i];
    const sedes = book.sedes.filter(sd => sd.saldo > 0).map(sd =>
      `<span class="sede-chip">${sd.ubicacion}</span>`).join('');
    return `
      <div class="book-card" id="card-${i}" style="animation-delay: ${i * 40}ms">
        <div class="book-cover" id="cover-${i}">
          <div class="book-cover-placeholder">
            <i class="ti ti-book-2"></i>
            <span>${book.editorial}</span>
          </div>
        </div>
        <div class="book-body">
          <div class="book-meta-top">
            <div class="book-title ${s.cls === 'agotado' ? 'agotado' : ''}">${book.titulo}</div>
            <span class="stock-tag ${s.cls}">${s.label}</span>
          </div>
          <div class="book-author">${book.autor}</div>
          <div class="book-editorial">${book.editorial} · ${book.tematica}</div>
          <div class="book-synopsis" id="synopsis-${i}"></div>
          <div class="book-footer">
            <span class="book-price ${s.cls === 'agotado' ? 'agotado' : ''}">${fmtPrice(book.precio)}</span>
            <div class="book-sedes">${sedes}</div>
          </div>
          <div class="book-extra" id="extra-${i}"></div>
        </div>
      </div>`;
  }).join('');

  // Cargar portadas y sinopsis de Google Books de forma asíncrona
  books.forEach(async (book, i) => {
    if (!book.isbn) return;
    const info = await fetchBookInfo(book.isbn);
    if (!info) return;
    if (info.cover) {
      const coverEl = document.getElementById(`cover-${i}`);
      if (coverEl) coverEl.innerHTML = `<img src="${info.cover}" alt="${book.titulo}" loading="lazy" />`;
    }
    if (info.synopsis) {
      const synEl = document.getElementById(`synopsis-${i}`);
      if (synEl) synEl.textContent = info.synopsis;
    }
    const extraEl = document.getElementById(`extra-${i}`);
    if (extraEl) {
      let extras = '';
      if (info.pages) extras += `<span><i class="ti ti-file-text" style="font-size:11px"></i> ${info.pages} págs.</span>`;
      if (info.year) extras += `<span><i class="ti ti-calendar" style="font-size:11px"></i> ${info.year}</span>`;
      extraEl.innerHTML = extras;
    }
  });
}

function runSearch(query) {
  const q = query.trim();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('no-results').style.display = 'none';

  if (q.length < 2) {
    document.getElementById('empty-state').style.display = 'block';
    return;
  }

  if (!loaded) {
    document.getElementById('status').textContent = 'Cargando catálogo...';
    return;
  }

  const books = search(q);

  if (books.length === 0) {
    document.getElementById('no-results').style.display = 'block';
    return;
  }

  document.getElementById('results-count').textContent = `${books.length} resultado${books.length !== 1 ? 's' : ''}`;
  document.getElementById('results-query').textContent = `para "${q}"`;
  document.getElementById('results').style.display = 'block';
  renderResults(books, q);
}

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => runSearch(e.target.value), 300);
});
</script>
