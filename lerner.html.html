<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escáner de Libros - Librería Lerner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
      --border-mid: #c8c6be; --text: #1a1a18; --muted: #6b6a66;
      --purple: #534AB7; --purple-dark: #3C3489; --purple-light: #EEEDFE;
      --purple-border: #CECBF6; --green: #0F6E56; --green-light: #EAF3DE;
      --green-text: #3B6D11; --amber-light: #FAEEDA; --amber-text: #854F0B;
      --red-light: #FCEBEB; --red: #A32D2D; --red-text: #791F1F;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
    #app { width: 100%; max-width: 480px; }
    .header { display: flex; align-items: center; padding: 1rem 0; margin-bottom: 1rem; }
    .header img { height: 48px; width: auto; }
    .scanner-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
    .viewport { position: relative; background: #12121e; height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #888; }
    .placeholder i { font-size: 44px; color: var(--purple); }
    .placeholder p { font-size: 13px; text-align: center; padding: 0 1rem; }
    .scan-line { position: absolute; left: 14%; right: 14%; height: 2px; background: var(--purple); top: 50%; animation: scan 2s ease-in-out infinite; display: none; }
    @keyframes scan { 0%,100%{top:28%} 50%{top:72%} }
    .corner { position: absolute; width: 24px; height: 24px; border-color: #AFA9EC; border-style: solid; display: none; }
    .corner.tl { top:10%; left:12%; border-width:2px 0 0 2px; }
    .corner.tr { top:10%; right:12%; border-width:2px 2px 0 0; }
    .corner.bl { bottom:10%; left:12%; border-width:0 0 2px 2px; }
    .corner.br { bottom:10%; right:12%; border-width:0 2px 2px 0; }
    .controls { padding: 12px 16px; }
    #btn-scan { width: 100%; padding: 10px 16px; border-radius: var(--radius); border: none; background: var(--purple); color: #fff; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    #btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-scan.active { background: var(--red); }
    .manual { display: flex; gap: 8px; margin-bottom: 12px; }
    .manual input { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-mid); font-family: "DM Sans", sans-serif; font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
    .manual input:focus { border-color: var(--purple); }
    .manual button { padding: 10px 16px; border-radius: var(--radius); border: 0.5px solid var(--border-mid); background: var(--surface); color: var(--text); font-family: "DM Sans", sans-serif; font-size: 14px; cursor: pointer; white-space: nowrap; }
    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 20px; padding: 4px 0; }
    #result { display: none; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 10px; animation: up 0.3s ease; }
    @keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .result-header { background: var(--purple-light); padding: 14px 16px; border-bottom: 0.5px solid var(--purple-border); }
    .result-title { font-family: "DM Serif Display", serif; font-size: 18px; color: var(--purple-dark); line-height: 1.3; }
    .result-author { font-size: 13px; color: var(--purple); margin-top: 3px; }
    .result-body { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field.full { grid-column: 1/-1; }
    .label { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; color: var(--muted); text-transform: uppercase; }
    .value { font-size: 14px; }
    .price { font-size: 30px; font-family: "DM Serif Display", serif; color: var(--green); letter-spacing: -0.5px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: var(--radius); }
    .ok { background: var(--green-light); color: var(--green-text); }
    .low { background: var(--amber-light); color: var(--amber-text); }
    .out { background: var(--red-light); color: var(--red); }
    .result-footer { border-top: 0.5px solid var(--border); padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
    .code { font-size: 11px; font-family: monospace; color: var(--muted); background: var(--bg); padding: 3px 8px; border-radius: var(--radius); border: 0.5px solid var(--border); }
    #not-found { display: none; background: var(--red-light); border: 0.5px solid var(--red); border-radius: var(--radius-lg); padding: 20px; text-align: center; margin-top: 10px; animation: up 0.3s ease; }
    #not-found i { font-size: 28px; color: var(--red); display: block; margin-bottom: 8px; }
    #not-found p { font-size: 14px; color: var(--red-text); font-weight: 500; }
    #not-found small { font-size: 12px; color: var(--red); }
    .footer { text-align: center; padding: 1.5rem 0 1rem; font-size: 11px; color: var(--muted); }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ_qp9KAm1Augwa00PtLN0bfayFugg3bEeQ-UYwFNu-VPLV5NsaJi3vqrkKk-4q4N0Sri5d1rFCoE-/pub?output=csv";
let inventory = {};
let loaded = false;
let scanning = false;
let stream = null;
let codeReader = null;

// ── Parser CSV/TSV ──────────────────────────────────────────
function splitRow(row, sep) {
  if (sep === '\t') return row.split('\t').map(c => c.trim().replace(/"/g, ''));
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { if (inQ && row[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = splitRow(lines[0], sep).map(h => h.trim());
  const idx = {
    isbn: headers.findIndex(h => h === 'ISBN'),
    lerner: headers.findIndex(h => h === 'Codigo Lerner'),
    titulo: headers.findIndex(h => h === 'Titulo'),
    autor: headers.findIndex(h => h === 'Autor'),
    editorial: headers.findIndex(h => h === 'Editorial'),
    tematica: headers.findIndex(h => h === 'Tematica'),
    proveedor: headers.findIndex(h => h === 'Proveedor'),
    bodega: headers.findIndex(h => h === 'Bodega'),
    precio: headers.findIndex(h => h === 'Precio'),
    ubicacion: headers.findIndex(h => h === 'Ubicacion'),
    saldo: headers.findIndex(h => h === 'Saldo'),
  };
  for (let i = 1; i < lines.length; i++) {
    const cols = splitRow(lines[i], sep);
    if (!cols[0]) continue;
    const isbn = cols[idx.isbn] || '';
    const lerner = cols[idx.lerner] || '';
    const ubicacion = cols[idx.ubicacion] || '';
    const saldo = parseInt(cols[idx.saldo] || '0') || 0;
    const key = isbn;
    if (!inventory[key] && key) {
      inventory[key] = {
        isbn, lerner,
        titulo: cols[idx.titulo] || '',
        autor: cols[idx.autor] || '',
        editorial: cols[idx.editorial] || '',
        tematica: cols[idx.tematica] || '',
        proveedor: cols[idx.proveedor] || '',
        bodega: cols[idx.bodega] || '',
        precio: parseInt((cols[idx.precio] || '0').replace(/\D/g, '')) || 0,
        sedes: [],
      };
    }
    if (key && ubicacion) inventory[key].sedes.push({ ubicacion, saldo });
    const lernerKey = lerner.trim();
    if (lernerKey && !inventory[lernerKey]) inventory[lernerKey] = inventory[key];
  }
}

async function loadInventory() {
  try {
    const resp = await fetch(SHEET_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    parseCSV(await resp.text());
    loaded = true;
    document.getElementById('inv-status').textContent = 'Apunta al código de barras del libro';
    document.getElementById('btn-scan').disabled = false;
  } catch(e) {
    document.getElementById('inv-status').textContent = 'Error al cargar inventario.';
  }
}
loadInventory();

// ── Mostrar resultado ───────────────────────────────────────
function fmtPrice(n) { return '$ ' + n.toLocaleString('es-CO'); }

function stockBadge(s) {
  if (s <= 0) return `<span class="badge out"><i class="ti ti-package-off"></i> Sin stock</span>`;
  if (s <= 3) return `<span class="badge low"><i class="ti ti-alert-triangle"></i> Stock bajo: ${s}</span>`;
  return `<span class="badge ok"><i class="ti ti-circle-check"></i> En stock: ${s}</span>`;
}

function showResult(code) {
  const book = inventory[code.trim()];
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  if (!book) { document.getElementById('not-found').style.display = 'block'; return; }
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <div class="result-header">
      <div class="result-title">${book.titulo || '—'}</div>
      <div class="result-author">${book.autor || ''}</div>
    </div>
    <div class="result-body">
      <div class="field full"><div class="label">Precio</div><div class="price">${fmtPrice(book.precio)}</div></div>
      <div class="field full">
        <div class="label">Disponibilidad por sede</div>
        <div class="value" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;">
          ${book.sedes.length ? book.sedes.map(s => `
            <div style="display:flex;align-items:center;gap:6px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:5px 10px;">
              <span style="font-size:13px;font-weight:500;">${s.ubicacion}</span>
              <span>${stockBadge(s.saldo)}</span>
            </div>`).join('') : stockBadge(0)}
        </div>
      </div>
      <div class="field"><div class="label">Editorial</div><div class="value">${book.editorial || '—'}</div></div>
      <div class="field"><div class="label">Temática</div><div class="value">${book.tematica || '—'}</div></div>
      <div class="field"><div class="label">Proveedor</div><div class="value">${book.proveedor || '—'}</div></div>
      <div class="field"><div class="label">Bodega</div><div class="value">${book.bodega || '—'}</div></div>
    </div>
    <div class="result-footer">
      <span class="code">ISBN: ${book.isbn}</span>
      ${book.lerner ? `<span class="code">Lerner: ${book.lerner}</span>` : ''}
    </div>
  `;
}

// ── Búsqueda manual ─────────────────────────────────────────
function buscar() {
  const code = document.getElementById('ean-input').value.trim();
  if (!code) { document.getElementById('status').textContent = 'Escribe un ISBN.'; return; }
  if (!loaded) { document.getElementById('status').textContent = 'Cargando inventario, espera...'; return; }
  document.getElementById('status').textContent = '';
  showResult(code);
  document.getElementById('ean-input').value = '';
}

document.getElementById('btn-buscar').addEventListener('click', buscar);
document.getElementById('ean-input').addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });

// Lector físico: detecta cuando termina de escribir (pausa 400ms)
let inputTimer = null;
document.getElementById('ean-input').addEventListener('input', () => {
  clearTimeout(inputTimer);
  inputTimer = setTimeout(() => {
    const val = document.getElementById('ean-input').value.trim();
    if (val.length >= 8 && /^[\d-]+$/.test(val)) buscar();
  }, 400);
});

// ── Cámara ──────────────────────────────────────────────────
function stopCamera() {
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  scanning = false;
  document.getElementById('video').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('scan-line').style.display = 'none';
  document.querySelectorAll('.corner').forEach(c => c.style.display = 'none');
  document.getElementById('btn-scan').classList.remove('active');
  document.getElementById('btn-label').textContent = 'Escanear con cámara';
  document.getElementById('status').textContent = '';
}

document.getElementById('btn-scan').addEventListener('click', () => {
  if (scanning) { stopCamera(); return; }
  document.getElementById('status').textContent = 'Iniciando cámara...';
  document.getElementById('result').style.display = 'none';
  document.getElementById('not-found').style.display = 'none';
  const video = document.getElementById('video');
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: isIOS ? 1280 : 1920 }, height: { ideal: isIOS ? 720 : 1080 } }
  }).then(async s => {
    stream = s;
    const track = s.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.focusMode) {
      for (const mode of ['continuous','single','manual']) {
        if (caps.focusMode.includes(mode)) { try { await track.applyConstraints({ advanced: [{ focusMode: mode }] }); break; } catch(e) {} }
      }
    }
    video.srcObject = s;
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('scan-line').style.display = 'block';
    document.querySelectorAll('.corner').forEach(c => c.style.display = 'block');
    scanning = true;
    document.getElementById('btn-scan').classList.add('active');
    document.getElementById('btn-label').textContent = 'Detener cámara';
    document.getElementById('status').textContent = 'Apunta al código de barras...';
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromStream(s, video, (result) => {
      if (result) { stopCamera(); showResult(result.getText()); }
    });
  }).catch(() => {
    document.getElementById('status').textContent = 'No se pudo acceder a la cámara.';
  });
});

document.getElementById('viewport').addEventListener('click', async () => {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  try { await track.applyConstraints({ advanced: [{ focusMode: 'single' }] }); } catch(e) {}
});
</script>
