<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escáner de Libros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f4f0;
      --color-surface: #ffffff;
      --color-border: #e2e0d8;
      --color-border-mid: #c8c6be;
      --color-text: #1a1a18;
      --color-text-muted: #6b6a66;
      --color-purple-dark: #3C3489;
      --color-purple-mid: #534AB7;
      --color-purple-light: #EEEDFE;
      --color-purple-border: #CECBF6;
      --color-green-dark: #0F6E56;
      --color-green-light: #EAF3DE;
      --color-green-text: #3B6D11;
      --color-amber-light: #FAEEDA;
      --color-amber-text: #854F0B;
      --color-red-light: #FCEBEB;
      --color-red-dark: #A32D2D;
      --color-red-text: #791F1F;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-surface: #252523;
        --color-border: #38382e;
        --color-border-mid: #4a4a40;
        --color-text: #f0efe8;
        --color-text-muted: #9a9990;
        --color-purple-dark: #AFA9EC;
        --color-purple-mid: #7F77DD;
        --color-purple-light: #26215C;
        --color-purple-border: #3C3489;
        --color-green-dark: #5DCAA5;
        --color-green-light: #04342C;
        --color-green-text: #9FE1CB;
        --color-amber-light: #412402;
        --color-amber-text: #FAC775;
        --color-red-light: #501313;
        --color-red-dark: #F09595;
        --color-red-text: #F7C1C1;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1.25rem 0 1rem;
      margin-bottom: 1rem;
    }

    .header-icon {
      width: 40px; height: 40px;
      background: var(--color-purple-mid);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon i { color: #fff; font-size: 20px; }

    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--color-text);
    }
    .header-sub { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }

    /* Scanner card */
    .scanner-card {
      background: var(--color-surface);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .scanner-viewport {
      position: relative;
      background: #12121e;
      height: 220px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    #scanner-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    .scanner-placeholder {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px; color: #888;
    }
    .scanner-placeholder i { font-size: 44px; color: var(--color-purple-mid); }
    .scanner-placeholder p { font-size: 13px; text-align: center; padding: 0 1rem; }

    .scan-line {
      position: absolute; left: 14%; right: 14%;
      height: 2px; background: var(--color-purple-mid);
      top: 50%; animation: scanAnim 2s ease-in-out infinite;
      display: none;
    }
    @keyframes scanAnim { 0%,100%{top:28%} 50%{top:72%} }

    .corner {
      position: absolute; width: 24px; height: 24px;
      border-color: #AFA9EC; border-style: solid; display: none;
    }
    .corner.tl { top:10%; left:12%; border-width:2px 0 0 2px; }
    .corner.tr { top:10%; right:12%; border-width:2px 2px 0 0; }
    .corner.bl { bottom:10%; left:12%; border-width:0 0 2px 2px; }
    .corner.br { bottom:10%; right:12%; border-width:0 2px 2px 0; }

    .scanner-controls {
      padding: 12px 16px;
      display: flex; gap: 8px;
    }

    #btn-scan {
      flex: 1; padding: 10px 16px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--color-purple-mid);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }
    #btn-scan:hover { background: var(--color-purple-dark); }
    #btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-scan.active { background: var(--color-red-dark); }

    /* Manual input */
    .manual-row {
      display: flex; gap: 8px;
      margin-bottom: 12px;
    }

    .manual-row input {
      flex: 1; padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s;
    }
    .manual-row input:focus { border-color: var(--color-purple-mid); }

    .manual-row button {
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-mid);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .manual-row button:hover { background: var(--color-bg); }

    /* Status */
    #status-msg {
      font-size: 13px; color: var(--color-text-muted);
      text-align: center; padding: 4px 0; min-height: 22px;
    }

    /* Result */
    #result-card {
      display: none;
      background: var(--color-surface);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: 10px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .result-header {
      background: var(--color-purple-light);
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--color-purple-border);
    }
    .result-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px; font-weight: 400;
      color: var(--color-purple-dark);
      line-height: 1.3;
    }
    .result-author { font-size: 13px; color: var(--color-purple-mid); margin-top: 3px; }

    .result-body {
      padding: 14px 16px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .result-field { display: flex; flex-direction: column; gap: 3px; }
    .result-field.full { grid-column: 1 / -1; }

    .field-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.07em;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }
    .field-value { font-size: 14px; color: var(--color-text); }

    .price-value {
      font-size: 30px;
      font-family: 'DM Serif Display', serif;
      color: var(--color-green-dark);
      letter-spacing: -0.5px;
    }

    .stock-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 500;
      padding: 4px 10px; border-radius: var(--radius-md);
    }
    .stock-ok  { background: var(--color-green-light);  color: var(--color-green-text); }
    .stock-low { background: var(--color-amber-light); color: var(--color-amber-text); }
    .stock-out { background: var(--color-red-light);   color: var(--color-red-dark); }

    .result-footer {
      border-top: 0.5px solid var(--color-border);
      padding: 10px 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    .code-badge {
      font-size: 11px; font-family: monospace;
      color: var(--color-text-muted);
      background: var(--color-bg);
      padding: 3px 8px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border);
    }

    .not-found {
      display: none;
      background: var(--color-red-light);
      border: 0.5px solid var(--color-red-dark);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      text-align: center;
      margin-top: 10px;
      animation: fadeUp 0.3s ease;
    }
    .not-found i { font-size: 28px; color: var(--color-red-dark); margin-bottom: 8px; display: block; }
    .not-found p { font-size: 14px; color: var(--color-red-text); font-weight: 500; }
    .not-found small { font-size: 12px; color: var(--color-red-dark); }

    /* Footer */
    .app-footer {
      text-align: center;
      padding: 1.5rem 0 1rem;
      font-size: 11px;
      color: var(--color-text-muted);
    }
  </style>
</head>

<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQ_qp9KAm1Augwa00PtLN0bfayFugg3bEeQ-UYwFNu-VPLV5NsaJi3vqrkKk-4q4N0Sri5d1rFCoE-/pub?output=csv";

  let inventory = {};
  let inventoryLoaded = false;
  let scanning = false;
  let stream = null;

  // ── Parser robusto: detecta TAB o coma, limpia espacios ──
  function splitRow(row, sep) {
    if (sep === '\t') return row.split('\t').map(c => c.trim().replace(/"/g, ''));
    const cols = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') {
        if (inQuotes && row[i+1] === '"') { cur += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        cols.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur.trim());
    return cols;
  }

  function parseCSV(text) {
    const lines = text.trim().split("\n");
    const sep = lines[0].includes('\t') ? '\t' : ',';
    const headers = splitRow(lines[0], sep).map(h => h.trim());
    const idx = {
      isbn:      headers.findIndex(h => h === 'ISBN'),
      lerner:    headers.findIndex(h => h === 'Codigo Lerner'),
      titulo:    headers.findIndex(h => h === 'Titulo'),
      autor:     headers.findIndex(h => h === 'Autor'),
      editorial: headers.findIndex(h => h === 'Editorial'),
      tematica:  headers.findIndex(h => h === 'Tematica'),
      proveedor: headers.findIndex(h => h === 'Proveedor'),
      bodega:    headers.findIndex(h => h === 'Bodega'),
      precio:    headers.findIndex(h => h === 'Precio'),
      ubicacion: headers.findIndex(h => h === 'Ubicacion'),
      saldo:     headers.findIndex(h => h === 'Saldo'),
    };

    for (let i = 1; i < lines.length; i++) {
      const cols = splitRow(lines[i], sep);
      if (!cols[0]) continue;
      const isbn     = cols[idx.isbn]   || '';
      const lerner   = (cols[idx.lerner] || '').split('-')[0].trim();
      const ubicacion = cols[idx.ubicacion] || '';
      const saldo     = parseInt(cols[idx.saldo] || '0') || 0;

      const base = {
        isbn,
        lerner:    cols[idx.lerner]    || '',
        titulo:    cols[idx.titulo]    || '',
        autor:     cols[idx.autor]     || '',
        editorial: cols[idx.editorial] || '',
        tematica:  cols[idx.tematica]  || '',
        proveedor: cols[idx.proveedor] || '',
        bodega:    cols[idx.bodega]    || '',
        precio:    parseInt((cols[idx.precio] || '0').replace(/\D/g, '')) || 0,
        sedes:     [],
      };

      // Agregar o actualizar entrada existente
      const key = isbn || lerner;
      if (!inventory[key]) {
        inventory[key] = Object.assign({}, base, { sedes: [] });
      }
      if (ubicacion) {
        inventory[key].sedes.push({ ubicacion, saldo });
      }
      // También indexar por código Lerner completo
      const lernerFull = cols[idx.lerner] || '';
      if (lernerFull && !inventory[lernerFull]) {
        inventory[lernerFull] = inventory[key];
      }
    }
  }

  async function loadInventory() {
    try {
      const resp = await fetch(SHEET_URL);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      parseCSV(text);
      inventoryLoaded = true;
      document.getElementById('inv-status').textContent = 'Apunta al código de barras del libro';
      document.getElementById('btn-scan').disabled = false;
    } catch(e) {
      document.getElementById('inv-status').textContent = 'Error al cargar inventario. Verifica la URL del Sheet.';
    }
  }

  loadInventory();

  // ── Helpers ─────────────────────────────────────────────────
  function fmtPrice(n) {
    return '$ ' + n.toLocaleString('es-CO');
  }

  function stockBadge(saldo) {
    if (saldo <= 0)  return `<span class="stock-badge stock-out"><i class="ti ti-package-off"></i> Sin stock</span>`;
    if (saldo <= 3)  return `<span class="stock-badge stock-low"><i class="ti ti-alert-triangle"></i> Stock bajo: ${saldo}</span>`;
    return `<span class="stock-badge stock-ok"><i class="ti ti-circle-check"></i> En stock: ${saldo}</span>`;
  }

  function showResult(code) {
    const book = inventory[code];
    document.getElementById('not-found').style.display = 'none';
    const rc = document.getElementById('result-card');
    if (!book) {
      rc.style.display = 'none';
      document.getElementById('not-found').style.display = 'block';
      return;
    }
    rc.style.display = 'block';
    rc.innerHTML = `
      <div class="result-header">
        <div class="result-title">${book.titulo || '—'}</div>
        <div class="result-author">${book.autor || ''}</div>
      </div>
      <div class="result-body">
        <div class="result-field full">
          <div class="field-label">Precio</div>
          <div class="price-value">${fmtPrice(book.precio)}</div>
        </div>
        <div class="result-field full">
          <div class="field-label">Disponibilidad por sede</div>
          <div class="field-value" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;">
            ${book.sedes.length ? book.sedes.map(s => `
              <div style="display:flex;align-items:center;gap:6px;background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:var(--radius-md);padding:5px 10px;">
                <span style="font-size:13px;font-weight:500;">${s.ubicacion}</span>
                <span style="font-size:12px;">${stockBadge(s.saldo)}</span>
              </div>`).join('') : stockBadge(0)}
          </div>
        </div>
        <div class="result-field">
          <div class="field-label">Editorial</div>
          <div class="field-value">${book.editorial || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">Temática</div>
          <div class="field-value">${book.tematica || '—'}</div>
        </div>
        <div class="result-field">
          <div class="field-label">Proveedor</div>
          <div class="field-value">${book.proveedor || '—'}</div>
        </div>

        ${book.bodega ? `<div class="result-field"><div class="field-label">Bodega</div><div class="field-value">${book.bodega}</div></div>` : ''}
      </div>
      <div class="result-footer">
        <span class="code-badge"><i class="ti ti-barcode" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>ISBN: ${book.isbn}</span>
        ${book.lerner ? `<span class="code-badge">Lerner: ${book.lerner}</span>` : ''}
      </div>
    `;
  }

  // ── Camera con ZXing (mejor enfoque en móviles) ─────────────
  let codeReader = null;

  function stopCamera() {
    if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    scanning = false;
    document.getElementById('scanner-video').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('scan-line').style.display = 'none';
    document.querySelectorAll('.corner').forEach(c => c.style.display = 'none');
    document.getElementById('btn-scan').classList.remove('active');
    document.getElementById('btn-label').textContent = 'Escanear con cámara';
    document.getElementById('status-msg').textContent = '';
  }

  document.getElementById('btn-scan').addEventListener('click', () => {
    if (!inventoryLoaded) { document.getElementById('status-msg').textContent = 'Espera a que cargue el inventario.'; return; }
    if (scanning) { stopCamera(); return; }

    document.getElementById('status-msg').textContent = 'Iniciando cámara...';
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('not-found').style.display = 'none';

    const video = document.getElementById('scanner-video');

    // Pedir stream con alta resolución y enfoque continuo
    const constraints = {
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous',
        advanced: [{ focusMode: 'continuous' }]
      }
    };

    navigator.mediaDevices.getUserMedia(constraints)
      .then(s => {
        stream = s;

        // Activar enfoque continuo en la pista de video
        const track = s.getVideoTracks()[0];
        if (track && track.applyConstraints) {
          track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
        }

        video.srcObject = s;
        video.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('scan-line').style.display = 'block';
        document.querySelectorAll('.corner').forEach(c => c.style.display = 'block');
        scanning = true;
        document.getElementById('btn-scan').classList.add('active');
        document.getElementById('btn-label').textContent = 'Detener cámara';
        document.getElementById('status-msg').textContent = 'Apunta al código de barras del libro...';

        // Iniciar ZXing sobre el stream ya activo
        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromStream(s, video, (result, err) => {
          if (result) {
            const code = result.getText();
            document.getElementById('status-msg').textContent = `Código detectado: ${code}`;
            stopCamera();
            showResult(code);
          }
        });
      })
      .catch(() => {
        document.getElementById('status-msg').textContent = 'No se pudo acceder a la cámara. Usa la búsqueda manual.';
      });
  });

  // ── Manual search ────────────────────────────────────────────
  document.getElementById('btn-manual').addEventListener('click', () => {
    const code = document.getElementById('ean-input').value.trim();
    if (!code) { document.getElementById('status-msg').textContent = 'Escribe un ISBN o código Lerner.'; return; }
    if (!inventoryLoaded) { document.getElementById('status-msg').textContent = 'Espera a que cargue el inventario.'; return; }
    stopCamera();
    document.getElementById('status-msg').textContent = `Buscando: ${code}...`;
    setTimeout(() => { showResult(code); document.getElementById('status-msg').textContent = ''; }, 200);
  });

  document.getElementById('ean-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-manual').click();
  });
</script>
</body>
</html>
